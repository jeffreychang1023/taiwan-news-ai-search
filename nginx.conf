# NLWeb Production — nginx reverse proxy with Cloudflare Origin SSL
# Placed at: /etc/nginx/conf.d/default.conf (via Docker volume mount)
# Auto-deploy: managed by GitHub Actions (2026-03-13)

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name twdubao.com www.twdubao.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS — Cloudflare Origin Certificate
server {
    listen 443 ssl;
    server_name twdubao.com www.twdubao.com;

    # Cloudflare Origin Certificate (15-year)
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # SSL settings (Cloudflare terminates public SSL, this is origin-to-Cloudflare)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy to NLWeb app
    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;

        # WebSocket support (for SSE streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forwarded headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for reasoning queries (can take 60-120s)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE: disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;

        # Large headers (cookies, auth tokens)
        proxy_buffer_size 8k;
    }

    # Health check endpoint (no SSL overhead)
    location /health {
        proxy_pass http://app:8000/health;
        proxy_read_timeout 5s;
    }
}
